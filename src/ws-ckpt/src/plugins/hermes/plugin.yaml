name: ws-ckpt
version: "0.3.1"
description: "Workspace checkpoint on each conversation turn via ws-ckpt daemon"
provides_tools:
  - ws-ckpt-config
  - ws-ckpt-checkpoint
  - ws-ckpt-rollback
  - ws-ckpt-list
  - ws-ckpt-diff
  - ws-ckpt-delete
  - ws-ckpt-status
provides_hooks:
  - on_session_start
  - pre_llm_call
  - on_session_end
